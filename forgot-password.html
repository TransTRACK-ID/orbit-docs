<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orbit Docs · Reset Password</title>
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
  <style>
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
      font-family: var(--od-font-display);
      font-size: 18px;
      font-weight: 600;
      color: var(--od-fg);
    }
    .brand svg {
      width: 22px;
      height: 22px;
      color: var(--od-accent);
      flex-shrink: 0;
    }
    .auth-card h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--od-fg);
      margin: 0 0 4px;
    }
    .auth-card .auth-desc {
      color: var(--od-muted);
      font-size: 14px;
      margin-bottom: 24px;
    }
    .success-msg {
      background: color-mix(in oklch, oklch(60% 0.18 145) 8%, transparent);
      color: oklch(50% 0.14 145);
      border: 1px solid oklch(60% 0.18 145);
      padding: 12px;
      border-radius: var(--od-radius);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <!-- Brand -->
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
    Orbit Docs
  </div>

  <div class="auth-card">
    <h2 id="formTitle">Reset password</h2>
    <p class="auth-desc" id="formDesc">Enter your email and we'll send you a link to reset your password.</p>

    <form novalidate id="forgotForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" required autocomplete="email" aria-describedby="emailError" />
        <span class="error-msg" id="emailError">Please enter a valid email address</span>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Send reset link</button>
    </form>

    <div class="auth-foot">
      <span>Remember your password?</span>
      <a href="login.html">Sign in</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('forgotForm');
    const emailInput = document.getElementById('email');
    const emailErr = document.getElementById('emailError');
    const formTitle = document.getElementById('formTitle');
    const formDesc = document.getElementById('formDesc');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const emailVal = emailInput.value.trim();
      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!emailRe.test(emailVal)) {
        emailInput.classList.add('input-error');
        emailInput.setAttribute('aria-invalid', 'true');
        emailErr.classList.add('show');
        return;
      }

      emailInput.classList.remove('input-error');
      emailInput.setAttribute('aria-invalid', 'false');
      emailErr.classList.remove('show');

      // Show success state
      formTitle.textContent = 'Check your email';
      formDesc.innerHTML = 'We\'ve sent a password reset link to <strong style="color:var(--od-fg)">' + escapeHtml(emailVal) + '</strong>. The link expires in 30 minutes.';
      form.innerHTML = '<button type="button" class="btn btn-primary" onclick="window.location.href=\'login.html\'">Back to sign in</button>' +
        '<div class="auth-foot"><span>Didn\'t receive it?</span><a href="forgot-password.html">Try again</a></div>';
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
