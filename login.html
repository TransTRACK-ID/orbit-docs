<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orbit Docs · Sign In</title>
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
  <style>
    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
      font-family: var(--od-font-display);
      font-size: 18px;
      font-weight: 600;
      color: var(--od-fg);
    }
    .brand svg {
      width: 22px;
      height: 22px;
      color: var(--od-accent);
      flex-shrink: 0;
    }
    .auth-card h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--od-fg);
      margin: 0 0 4px;
    }
    .auth-card .auth-desc {
      color: var(--od-muted);
      font-size: 14px;
      margin-bottom: 24px;
    }
    .pw-toggle {
      position: absolute;
      inset-y: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      color: var(--od-muted);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.15s;
    }
    .pw-toggle:hover { color: var(--od-fg); }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 40px; }
    .forgot-link {
      display: flex;
      justify-content: flex-end;
    }
    .forgot-link a {
      font-size: 13px;
      color: var(--od-muted);
      transition: color 0.15s;
    }
    .forgot-link a:hover { color: var(--od-fg); text-decoration: underline; }
  </style>
</head>
<body>
  <!-- Brand -->
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
    Orbit Docs
  </div>

  <div class="auth-card">
    <h2>Sign in</h2>
    <p class="auth-desc">Enter your credentials to access your workspace.</p>

    <form novalidate id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" required autocomplete="email" aria-describedby="emailError" />
        <span class="error-msg" id="emailError">Please enter a valid email address</span>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" aria-describedby="passwordError" />
          <button type="button" class="pw-toggle" id="pwToggle" tabindex="-1" aria-label="Show password">
            <svg id="eyeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="error-msg" id="passwordError">Password is required</span>
      </div>
      <div class="form-group forgot-link">
        <a href="forgot-password.html">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>

    <div class="auth-foot">
      <span>Don't have an account?</span>
      <a href="register.html">Register</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const pwInput = document.getElementById('password');
    const pwToggle = document.getElementById('pwToggle');
    const eyeIcon = document.getElementById('eyeIcon');

    pwToggle.addEventListener('click', function () {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      eyeIcon.innerHTML = isText
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    });

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      let ok = true;

      const email = document.getElementById('email');
      const emailErr = document.getElementById('emailError');
      const emailVal = email.value.trim();
      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRe.test(emailVal)) {
        email.classList.add('input-error');
        email.setAttribute('aria-invalid', 'true');
        emailErr.classList.add('show');
        ok = false;
      } else {
        email.classList.remove('input-error');
        email.setAttribute('aria-invalid', 'false');
        emailErr.classList.remove('show');
      }

      const password = document.getElementById('password');
      const passwordErr = document.getElementById('passwordError');
      if (!password.value) {
        password.classList.add('input-error');
        password.setAttribute('aria-invalid', 'true');
        passwordErr.classList.add('show');
        ok = false;
      } else {
        password.classList.remove('input-error');
        password.setAttribute('aria-invalid', 'false');
        passwordErr.classList.remove('show');
      }

      if (ok) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
