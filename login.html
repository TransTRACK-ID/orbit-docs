<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orbit Docs · Sign In</title>
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body>
  <div class="auth-card">
    <div class="auth-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
      <h1>Sign in to Orbit Docs</h1>
    </div>
    <p class="auth-sub">Enter your credentials to access the platform.</p>

    <form novalidate id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" required autocomplete="email" aria-describedby="emailError" />
        <span class="error-msg" id="emailError">Please enter a valid email address</span>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" aria-describedby="passwordError" />
        <span class="error-msg" id="passwordError">Password is required</span>
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>

    <div class="auth-foot">
      <span>Don’t have an account?</span>
      <a href="register.html">Register</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      let ok = true;

      const email = document.getElementById('email');
      const emailErr = document.getElementById('emailError');
      const emailVal = email.value.trim();
      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRe.test(emailVal)) {
        email.classList.add('input-error');
        email.setAttribute('aria-invalid', 'true');
        emailErr.classList.add('show');
        ok = false;
      } else {
        email.classList.remove('input-error');
        email.setAttribute('aria-invalid', 'false');
        emailErr.classList.remove('show');
      }

      const password = document.getElementById('password');
      const passwordErr = document.getElementById('passwordError');
      if (!password.value) {
        password.classList.add('input-error');
        password.setAttribute('aria-invalid', 'true');
        passwordErr.classList.add('show');
        ok = false;
      } else {
        password.classList.remove('input-error');
        password.setAttribute('aria-invalid', 'false');
        passwordErr.classList.remove('show');
      }

      if (ok) {
        // demo success — in a real app this would POST to an API
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
