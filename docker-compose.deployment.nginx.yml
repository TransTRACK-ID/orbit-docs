version: '3.8'

services:
  application:
    image: ${CI_REGISTRY_IMAGE}/application:${CI_COMMIT_TAG}
    restart: unless-stopped
    tty: true
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_URL: ${DATABASE_URL}
      APP_KEY: ${APP_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL}
      NUXT_APP_BASE_URL: ${NUXT_APP_BASE_URL:-}
      OPENCODE_CONFIG_B64: ${OPENCODE_CONFIG_B64:-}
    deploy:
      replicas: ${COMPOSE_REPLICAS:-1}
    volumes:
      - /tmp/orbit-docs-repositories:/tmp/orbit-docs-repositories
      - /etc/localtime:/etc/localtime:ro
    networks:
      - orbit-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - application
    networks:
      - orbit-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

networks:
  orbit-network:
    driver: bridge
