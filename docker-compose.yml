version: '3'
services:
    application:
        build:
            context: .
            dockerfile: Dockerfile
        image: ${IMAGE_NAME}
        restart: unless-stopped
        tty: true
        environment:
            SERVICE_NAME: ${IMAGE_NAME}-${APP_ENV}-application
            SERVICE_TAGS: dev
        working_dir: /home/node/app
        deploy:
            replicas: ${COMPOSE_REPLICAS:-1}
        ports:
          - "${COMPOSE_PUBLIC_PORT}:3000"
        volumes:
            - ./:/home/node/app
        networks:
            - proxy
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}.entrypoints=http"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}.rule=Host(`${APP_HOST}`)"
            - "traefik.http.middlewares.${IMAGE_NAME}-${APP_ENV}-https-redirect.redirectscheme.scheme=https"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}.middlewares=${IMAGE_NAME}-${APP_ENV}-https-redirect"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-secure.entrypoints=https"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-secure.rule=Host(`${APP_HOST}`)"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-secure.tls=true"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-secure.tls.certresolver=http"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-secure.service=${IMAGE_NAME}-${APP_ENV}"
            - "traefik.http.services.${IMAGE_NAME}-${APP_ENV}.loadbalancer.server.port=3000"
            - "traefik.docker.network=proxy"

    mcp-server:
        build:
            context: .
            dockerfile: Dockerfile.mcp
        image: ${IMAGE_NAME}-mcp
        restart: unless-stopped
        environment:
            POSTGRES_URL: ${POSTGRES_URL}
            MCP_PORT: ${MCP_PORT:-41244}
            MCP_API_KEY: ${MCP_API_KEY}
        ports:
            - "${MCP_PORT:-41244}:41244"
        networks:
            - proxy
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-mcp.entrypoints=http"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-mcp.rule=Host(`${MCP_HOST:-mcp.${APP_HOST}`)"
            - "traefik.http.middlewares.${IMAGE_NAME}-${APP_ENV}-mcp-https-redirect.redirectscheme.scheme=https"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-mcp.middlewares=${IMAGE_NAME}-${APP_ENV}-mcp-https-redirect"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-mcp-secure.entrypoints=https"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-mcp-secure.rule=Host(`${MCP_HOST:-mcp.${APP_HOST}`)"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-mcp-secure.tls=true"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-mcp-secure.tls.certresolver=http"
            - "traefik.http.routers.${IMAGE_NAME}-${APP_ENV}-mcp-secure.service=${IMAGE_NAME}-${APP_ENV}-mcp"
            - "traefik.http.services.${IMAGE_NAME}-${APP_ENV}-mcp.loadbalancer.server.port=41244"
            - "traefik.docker.network=proxy"

#Docker Networks
networks:
    proxy:
        external: true
