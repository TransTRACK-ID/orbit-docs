version: '3.8'

services:
  application:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-orbit-docs}
    restart: unless-stopped
    tty: true
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_URL: ${DATABASE_URL}
      APP_KEY: ${APP_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
      NUXT_APP_BASE_URL: ${NUXT_APP_BASE_URL:-}
      OPENCODE_CONFIG_B64: ${OPENCODE_CONFIG_B64:-}
      DOC_AGENT: ${DOC_AGENT:-opencode}
      NUXT_PUBLIC_DOC_AGENT: ${DOC_AGENT:-opencode}
      CURSOR_MODEL: ${CURSOR_MODEL:-auto}
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      NITRO_POSTRACK_API_URL: ${NITRO_POSTRACK_API_URL:-}
      NITRO_POSTRACK_API_KEY: ${NITRO_POSTRACK_API_KEY:-}
      ORBIT_REPO_DIR: /home/nodejs/.local/share/orbit-docs-repositories
    ports:
      - "${COMPOSE_PUBLIC_PORT:-3000}:3000"
    volumes:
      - orbit-docs-repositories:/home/nodejs/.local/share/orbit-docs-repositories
    networks:
      - orbit-network

volumes:
  orbit-docs-repositories:

networks:
  orbit-network:
    driver: bridge
