<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orbit Docs · Create Account</title>
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body>
  <div class="auth-card">
    <div class="auth-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
      <h1>Create your account</h1>
    </div>
    <p class="auth-sub">Register to start managing documentation.</p>

    <form novalidate id="registerForm">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="Jane" required autocomplete="given-name" aria-describedby="firstNameError" />
          <span class="error-msg" id="firstNameError">First name is required</span>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Doe" required autocomplete="family-name" aria-describedby="lastNameError" />
          <span class="error-msg" id="lastNameError">Last name is required</span>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" required autocomplete="email" aria-describedby="emailError" />
        <span class="error-msg" id="emailError">Please enter a valid email address</span>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password" aria-describedby="passwordError" />
        <span class="error-msg" id="passwordError">Password must be at least 8 characters</span>
      </div>
      <div class="form-group">
        <label for="team">Team <span class="opt">(optional)</span></label>
        <input type="text" id="team" placeholder="Engineering" autocomplete="organization" />
      </div>
      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>

    <div class="auth-foot">
      <span>Already have an account?</span>
      <a href="login.html">Sign in</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      let ok = true;

      const firstName = document.getElementById('firstName');
      const firstNameErr = document.getElementById('firstNameError');
      if (!firstName.value.trim()) {
        firstName.classList.add('input-error');
        firstName.setAttribute('aria-invalid', 'true');
        firstNameErr.classList.add('show');
        ok = false;
      } else {
        firstName.classList.remove('input-error');
        firstName.setAttribute('aria-invalid', 'false');
        firstNameErr.classList.remove('show');
      }

      const lastName = document.getElementById('lastName');
      const lastNameErr = document.getElementById('lastNameError');
      if (!lastName.value.trim()) {
        lastName.classList.add('input-error');
        lastName.setAttribute('aria-invalid', 'true');
        lastNameErr.classList.add('show');
        ok = false;
      } else {
        lastName.classList.remove('input-error');
        lastName.setAttribute('aria-invalid', 'false');
        lastNameErr.classList.remove('show');
      }

      const email = document.getElementById('email');
      const emailErr = document.getElementById('emailError');
      const emailVal = email.value.trim();
      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRe.test(emailVal)) {
        email.classList.add('input-error');
        email.setAttribute('aria-invalid', 'true');
        emailErr.classList.add('show');
        ok = false;
      } else {
        email.classList.remove('input-error');
        email.setAttribute('aria-invalid', 'false');
        emailErr.classList.remove('show');
      }

      const password = document.getElementById('password');
      const passwordErr = document.getElementById('passwordError');
      if (password.value.length < 8) {
        password.classList.add('input-error');
        password.setAttribute('aria-invalid', 'true');
        passwordErr.classList.add('show');
        ok = false;
      } else {
        password.classList.remove('input-error');
        password.setAttribute('aria-invalid', 'false');
        passwordErr.classList.remove('show');
      }

      if (ok) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
