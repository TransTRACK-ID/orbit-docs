<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orbit Docs · Create Account</title>
  <style>
    :root {
      --bg:      oklch(98% 0.004 250);
      --surface: oklch(100% 0 0);
      --fg:      oklch(20% 0.02 250);
      --muted:   oklch(55% 0.015 250);
      --border:  oklch(90% 0.006 250);
      --accent:  oklch(55% 0.16 25);
      --accent-soft: color-mix(in oklch, var(--accent) 12%, transparent);
      --fg-soft:     color-mix(in oklch, var(--fg) 6%, transparent);
      --font-display: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      --font-body:    -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      --fs-h1: 24px;
      --fs-h2: 20px;
      --fs-body: 14px;
      --fs-meta: 12px;
      --gap-xs: 8px;
      --gap-sm: 12px;
      --gap-md: 16px;
      --gap-lg: 24px;
      --gap-xl: 32px;
      --radius: 8px;
      --radius-lg: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font-family: var(--font-body); font-size: var(--fs-body);
      line-height: 1.5; text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; }
    h1 { margin: 0; font-weight: 600; font-size: var(--fs-h1); }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--gap-xl);
      width: 100%; max-width: 400px;
    }
    .auth-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: var(--gap-lg);
    }
    .auth-header svg { width: 22px; height: 22px; color: var(--accent); flex-shrink: 0; }
    .auth-header h1 { font-family: var(--font-display); font-size: 18px; }
    .auth-sub {
      color: var(--muted); font-size: var(--fs-body);
      margin-bottom: var(--gap-lg);
    }

    .form-group { margin-bottom: var(--gap-md); }
    .form-group label {
      display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px;
    }
    .form-group label .opt { color: var(--muted); font-weight: 400; }
    .form-group input {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg); font: inherit; font-size: 14px; color: var(--fg);
      transition: border-color .15s, box-shadow .15s;
    }
    .form-group input:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .input-error { border-color: oklch(55% 0.18 25) !important; box-shadow: 0 0 0 3px color-mix(in oklch, oklch(55% 0.18 25) 20%, transparent) !important; }
    .error-msg {
      display: none; color: oklch(50% 0.16 25); font-size: 12px; margin-top: 4px;
    }
    .error-msg.show { display: block; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap-md); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 10px 16px; border-radius: var(--radius);
      border: 1px solid transparent; font-size: 14px; font-weight: 500;
      transition: background .15s cubic-bezier(.4,0,.2,1), border-color .15s cubic-bezier(.4,0,.2,1);
    }
    .btn-primary { background: var(--accent); color: var(--surface); border-color: var(--accent); }
    .btn-primary:hover { background: color-mix(in oklch, var(--accent) 88%, black); }
    .btn-secondary { background: transparent; color: var(--fg); border-color: var(--border); }
    .btn-secondary:hover { border-color: var(--fg); }

    .auth-foot {
      margin-top: var(--gap-lg);
      padding-top: var(--gap-md);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      gap: 6px;
      font-size: 13px; color: var(--muted);
    }
    .auth-foot a { color: var(--accent); font-weight: 500; transition: color .15s; }
    .auth-foot a:hover { color: color-mix(in oklch, var(--accent) 88%, black); }

    .btn:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--radius);
    }

    @media (max-width: 420px) {
      .form-row { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
      <h1>Create your account</h1>
    </div>
    <p class="auth-sub">Register to start managing documentation.</p>

    <form novalidate id="registerForm">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="Jane" required autocomplete="given-name" aria-describedby="firstNameError" />
          <span class="error-msg" id="firstNameError">First name is required</span>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Doe" required autocomplete="family-name" aria-describedby="lastNameError" />
          <span class="error-msg" id="lastNameError">Last name is required</span>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" required autocomplete="email" aria-describedby="emailError" />
        <span class="error-msg" id="emailError">Please enter a valid email address</span>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password" aria-describedby="passwordError" />
        <span class="error-msg" id="passwordError">Password must be at least 8 characters</span>
      </div>
      <div class="form-group">
        <label for="team">Team <span class="opt">(optional)</span></label>
        <input type="text" id="team" placeholder="Engineering" autocomplete="organization" />
      </div>
      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>

    <div class="auth-foot">
      <span>Already have an account?</span>
      <a href="login.html">Sign in</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      let ok = true;

      const firstName = document.getElementById('firstName');
      const firstNameErr = document.getElementById('firstNameError');
      if (!firstName.value.trim()) {
        firstName.classList.add('input-error');
        firstName.setAttribute('aria-invalid', 'true');
        firstNameErr.classList.add('show');
        ok = false;
      } else {
        firstName.classList.remove('input-error');
        firstName.setAttribute('aria-invalid', 'false');
        firstNameErr.classList.remove('show');
      }

      const lastName = document.getElementById('lastName');
      const lastNameErr = document.getElementById('lastNameError');
      if (!lastName.value.trim()) {
        lastName.classList.add('input-error');
        lastName.setAttribute('aria-invalid', 'true');
        lastNameErr.classList.add('show');
        ok = false;
      } else {
        lastName.classList.remove('input-error');
        lastName.setAttribute('aria-invalid', 'false');
        lastNameErr.classList.remove('show');
      }

      const email = document.getElementById('email');
      const emailErr = document.getElementById('emailError');
      const emailVal = email.value.trim();
      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRe.test(emailVal)) {
        email.classList.add('input-error');
        email.setAttribute('aria-invalid', 'true');
        emailErr.classList.add('show');
        ok = false;
      } else {
        email.classList.remove('input-error');
        email.setAttribute('aria-invalid', 'false');
        emailErr.classList.remove('show');
      }

      const password = document.getElementById('password');
      const passwordErr = document.getElementById('passwordError');
      if (password.value.length < 8) {
        password.classList.add('input-error');
        password.setAttribute('aria-invalid', 'true');
        passwordErr.classList.add('show');
        ok = false;
      } else {
        password.classList.remove('input-error');
        password.setAttribute('aria-invalid', 'false');
        passwordErr.classList.remove('show');
      }

      if (ok) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
